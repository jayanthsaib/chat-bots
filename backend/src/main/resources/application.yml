spring:
  application:
    name: botforge

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/botforge}
    username: ${SPRING_DATASOURCE_USERNAME:botforge}
    password: ${SPRING_DATASOURCE_PASSWORD:botforge_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  async:
    executor:
      core-pool-size: 4
      max-pool-size: 16
      queue-capacity: 100

server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always

# Application config
botforge:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-at-least-256-bits-long}
    access-token-expiry: 900        # 15 minutes in seconds
    refresh-token-expiry: 604800    # 7 days in seconds

  openai:
    api-key: ${OPENAI_API_KEY:}
    embedding-model: text-embedding-ada-002
    chat-model: gpt-4o-mini
    base-url: https://api.openai.com/v1

  upload:
    dir: ${UPLOAD_DIR:./uploads}
    max-size-bytes: 10485760  # 10MB

  razorpay:
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

  rate-limit:
    requests-per-minute: 60

  cors:
    allowed-origins: "*"

logging:
  level:
    com.infectbyte.botforge: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
